<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drum Machine — capstan drum generator</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden;
        font: 13px/1.4 -apple-system, system-ui, sans-serif; }
      #app { position: fixed; inset: 0; background: #15181d; }
      canvas { display: block; }
      #panel {
        position: fixed; top: 12px; left: 12px; width: 230px; z-index: 10;
        background: #1f242c; border: 1px solid #2c333d; border-radius: 10px;
        padding: 14px 14px 12px; color: #d6dbe2;
        box-shadow: 0 6px 24px rgba(0,0,0,.35);
      }
      #panel h1 { font-size: 14px; margin: 0 0 2px; }
      #panel .sub { color: #7d8794; font-size: 11px; margin: 0 0 12px; }
      .row { display: flex; justify-content: space-between; align-items: center;
        margin: 9px 0; gap: 8px; }
      .row label { color: #aab2bd; }
      .row output { color: #fff; font-variant-numeric: tabular-nums; min-width: 42px;
        text-align: right; }
      input[type="range"] { width: 100%; }
      .slider { margin: 9px 0; }
      .slider .row { margin: 0 0 3px; }
      button {
        width: 100%; margin-top: 10px; padding: 8px; border: 0; border-radius: 7px;
        background: #3b82f6; color: #fff; font-weight: 600; cursor: pointer;
      }
      button.ghost { background: #2c333d; color: #cdd4dd; font-weight: 500; }
      button:disabled { opacity: .5; cursor: default; }
      #status { margin-top: 10px; min-height: 16px; color: #8b94a0; font-size: 11px; }
      #status.err { color: #f8746c; }
      .hint { margin-top: 8px; color: #6b7480; font-size: 10px; }

      #busy {
        position: fixed; inset: 0; z-index: 20; pointer-events: none;
        display: none; flex-direction: column; align-items: center;
        justify-content: center; gap: 14px;
      }
      #busy.show { display: flex; }
      #busy .ring {
        width: 46px; height: 46px; border-radius: 50%;
        border: 4px solid #2c333d; border-top-color: #3b82f6;
        animation: spin 0.9s linear infinite;
      }
      #busy .phase {
        color: #d6dbe2; font-size: 13px; letter-spacing: .2px;
        text-shadow: 0 1px 6px rgba(0,0,0,.6);
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="panel">
      <h1>Drum Machine</h1>
      <p class="sub">Capstan drum · Replicad + three.js</p>

      <div class="slider">
        <div class="row"><label>Turns</label><output id="turns-v">4</output></div>
        <input type="range" id="turns" min="1" max="24" step="1" value="4" />
      </div>
      <div class="slider">
        <div class="row"><label>Blank Ø (mm)</label><output id="blankD-v">10.2</output></div>
        <input type="range" id="blankD" min="6" max="20" step="0.2" value="10.2" />
      </div>
      <div class="slider">
        <div class="row"><label>Pitch (mm)</label><output id="pitch-v">1.4</output></div>
        <input type="range" id="pitch" min="0.8" max="3" step="0.1" value="1.4" />
      </div>
      <div class="slider">
        <div class="row"><label>Groove width (mm)</label><output id="grooveW-v">1.2</output></div>
        <input type="range" id="grooveW" min="0.6" max="2.4" step="0.1" value="1.2" />
      </div>

      <button id="generate">Generate</button>
      <button id="download" class="ghost" disabled>Download STL</button>
      <div id="status">booting kernel…</div>
      <p class="hint">Drag to orbit · scroll to zoom. More turns look better but
        generate slower (~1 min for a full 23-turn drum).</p>
    </div>
    <div id="busy"><div class="ring"></div><div class="phase" id="phase">booting kernel…</div></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
