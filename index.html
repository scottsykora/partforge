<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drum Machine — capstan drum generator</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden;
        font: 13px/1.4 -apple-system, system-ui, sans-serif; }
      #app { position: fixed; inset: 0; background: #15181d; }
      canvas { display: block; }

      #panel {
        position: fixed; top: 12px; left: 12px; width: 252px;
        max-height: calc(100vh - 24px); overflow-y: auto; z-index: 10;
        background: #1f242c; border: 1px solid #2c333d; border-radius: 10px;
        padding: 14px; color: #d6dbe2; box-shadow: 0 6px 24px rgba(0,0,0,.35);
      }
      #panel h1 { font-size: 14px; margin: 0 0 2px; }
      #panel .sub { color: #7d8794; font-size: 11px; margin: 0 0 12px; }

      .seg { display: flex; gap: 4px; margin-bottom: 12px; }
      .seg button {
        flex: 1; padding: 7px 0; border: 1px solid #2c333d; border-radius: 7px;
        background: #20262e; color: #aab2bd; cursor: pointer; font-size: 12px;
      }
      .seg button.on { background: #3b82f6; color: #fff; border-color: #3b82f6; }

      .section {
        border: 1px solid #2c333d; border-radius: 8px; padding: 9px 10px;
        margin-bottom: 8px; background: #20262e;
      }
      .sec-title { font-weight: 600; color: #e7ebf1; margin-bottom: 7px; }
      select.preset {
        width: 100%; background: #161a20; color: #cdd4dd;
        border: 1px solid #2c333d; border-radius: 6px; padding: 5px 7px; font-size: 11px;
      }
      .feat { display: flex; align-items: center; gap: 8px; margin: 6px 0;
        color: #cdd4dd; cursor: pointer; }
      .feat input { cursor: pointer; }
      .feat-group { margin: 2px 0 8px; padding-left: 9px; border-left: 2px solid #2c333d; }
      .feat-group.hidden { display: none; }
      .adv-toggle {
        margin-top: 8px; padding: 3px 0; width: 100%; border: 0; border-radius: 5px;
        background: transparent; color: #7d8794; cursor: pointer; font-size: 11px;
        text-align: left;
      }
      .adv-toggle:hover { color: #aab2bd; }
      .adv.hidden { display: none; }
      .adv { margin-top: 4px; }

      .slider { margin: 7px 0; }
      .row { display: flex; justify-content: space-between; align-items: center;
        margin: 0 0 3px; gap: 8px; }
      .row label { color: #aab2bd; }
      .row output { color: #fff; font-variant-numeric: tabular-nums; min-width: 48px;
        text-align: right; }
      input[type="range"] { width: 100%; }

      button.action {
        width: 100%; margin-top: 8px; padding: 9px; border: 0; border-radius: 7px;
        background: #3b82f6; color: #fff; font-weight: 600; cursor: pointer;
      }
      button.ghost { background: #2c333d; color: #cdd4dd; font-weight: 500; }
      button.action:disabled { opacity: .5; cursor: default; }
      #status { margin-top: 10px; min-height: 16px; color: #8b94a0; font-size: 11px; }
      #status.err { color: #f8746c; }
      .hint { margin-top: 8px; color: #6b7480; font-size: 10px; }

      /* part tabs, floated top-centre over the viewport */
      #topbar {
        position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
        z-index: 15;
      }
      #topbar .seg {
        margin: 0; padding: 4px; background: #1f242c; border: 1px solid #2c333d;
        border-radius: 9px; box-shadow: 0 6px 24px rgba(0,0,0,.35);
      }
      #topbar .seg button { min-width: 70px; padding: 7px 10px; }

      #busy {
        position: fixed; inset: 0; z-index: 20; pointer-events: none;
        display: none; flex-direction: column; align-items: center;
        justify-content: center; gap: 14px;
      }
      #busy.show { display: flex; }
      #busy .ring {
        width: 46px; height: 46px; border-radius: 50%;
        border: 4px solid #2c333d; border-top-color: #3b82f6;
        animation: spin 0.9s linear infinite;
      }
      #busy .phase { color: #d6dbe2; font-size: 13px; text-shadow: 0 1px 6px rgba(0,0,0,.6); }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="topbar">
      <div class="seg" id="part">
        <button data-part="small">Small</button>
        <button data-part="big">Big</button>
        <button data-part="both" class="on">Both</button>
      </div>
    </div>

    <div id="panel">
      <h1>Drum Machine</h1>
      <p class="sub">Capstan drum · Replicad + three.js</p>

      <div id="controls"></div>

      <button id="download" class="action ghost" disabled>Download STL</button>
      <button id="download-step" class="action ghost" disabled>Download STEP</button>
      <div id="status">booting kernel…</div>
      <p class="hint">Drag to orbit · scroll to zoom. Each section has presets;
        open <b>Advanced</b> for the full controls. Big drum + Both take longer.</p>
    </div>

    <div id="busy"><div class="ring"></div><div class="phase" id="phase">booting kernel…</div></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
