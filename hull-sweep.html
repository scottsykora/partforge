<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hull sweep — hull / hullChain demo</title>
    <!-- Dev example app for the hull-sweep part (parts/hull-sweep.js), showcasing
         k.hull / k.hullChain. `npm run dev`, then open /hull-sweep.html. Structural
         markup only — the chrome CSS comes from the framework. See docs/AUTHORING-PARTS.md. -->
  </head>
  <body>
    <div id="app"></div>

    <div id="topbar">
      <div class="seg" id="part"></div>
    </div>

    <div id="viewbar">
      <button id="pause" title="Pause rotation">⏸</button>
      <button id="reframe" title="Reframe">⛶</button>
      <button id="theme" title="Toggle light/dark">◐</button>
    </div>

    <div id="panel">
      <h1>Hull sweep</h1>
      <p class="sub">hull / hullChain demo · capsules, tapers, straps</p>

      <div id="controls"></div>

      <div class="dl">
        <div class="dl-head">Download</div>
        <div class="dl-row">
          <button id="download-step" disabled>STEP</button>
          <button id="download" disabled>STL</button>
          <button id="download-3mf" disabled>3MF</button>
        </div>
      </div>
      <div id="status">booting kernel…</div>
      <p class="hint">Drag to orbit · scroll to zoom. Toggle "Convex wrap" to see k.hull vs k.hullChain.</p>
    </div>

    <div id="busy"><div class="ring"></div><div class="phase" id="phase">booting kernel…</div></div>
    <script type="module" src="/src/app-hull-sweep.js"></script>
  </body>
</html>
