<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text worker smoke — dev/CI fixture</title>
    <!-- Dev-only example app for the text-smoke part (parts/text-smoke.js). `npm run
         dev`, then open /text-smoke.html. Structural markup only — the chrome CSS
         comes from the framework (mount imports framework/app.css). This fixture
         exists so scripts/check-app.mjs can boot a real text2d build inside the
         actual Vite Web Worker (see docs/AUTHORING-PARTS.md). -->
  </head>
  <body>
    <div id="app"></div>

    <div id="topbar">
      <!-- view tabs are generated by mount from part.views — leave empty -->
      <div class="seg" id="part"></div>
    </div>

    <div id="viewbar">
      <button id="pause" title="Pause rotation">⏸</button>
      <button id="reframe" title="Reframe">⛶</button>
      <button id="theme" title="Toggle light/dark">◐</button>
    </div>

    <div id="panel">
      <h1>Text worker smoke</h1>
      <p class="sub">Text-smoke fixture · resolved text2d in the real worker</p>

      <div id="controls"></div>

      <div class="dl">
        <div class="dl-head">Download</div>
        <div class="dl-row">
          <button id="download-step" disabled>STEP</button>
          <button id="download" disabled>STL</button>
          <button id="download-3mf" disabled>3MF</button>
        </div>
      </div>
      <div id="status">booting kernel…</div>
      <p class="hint">Drag to orbit · scroll to zoom. CI fixture proving paper.js runs in the geometry worker.</p>
    </div>

    <div id="busy"><div class="ring"></div><div class="phase" id="phase">booting kernel…</div></div>
    <script type="module" src="/src/app-text-smoke.js"></script>
  </body>
</html>
