name: CI
# Runs the unit suite and the headless smoke check on every PR and on pushes to
# main. The smoke check (npm run check) starts a dev server and boots the demo app
# in real Chromium, catching worker/WASM/wiring failures that unit tests miss.
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm test
      - run: npx playwright install --with-deps chromium # browser for the smoke check
      # Distinct ports per check: each run spawns `vite --strictPort`, and the prior
      # run's vite can still hold its port when the next starts (the npx-wrapper kill
      # orphans the vite child on the Linux runner), so a shared port fails the 2nd run.
      - run: CHECK_PORT=5179 node scripts/check-app.mjs demo.html
      - run: CHECK_PORT=5180 node scripts/check-app.mjs planter.html
      - run: CHECK_PORT=5181 node scripts/check-app.mjs filleted-box.html
      - run: CHECK_PORT=5182 node scripts/check-app.mjs text-smoke.html
