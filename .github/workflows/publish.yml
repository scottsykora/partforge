name: Publish
# Publishes to npm when a v* tag is pushed (e.g. `git tag v0.1.1 && git push --tags`).
# Requires an NPM_TOKEN repo secret (a classic Automation or granular read+write token).
on:
  push:
    tags: ["v*"]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm test
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
